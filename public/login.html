<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Crittix Panel</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .box { background:var(--card); border:1px solid var(--purple); border-radius:12px; padding:40px; width:340px; box-shadow:0 0 40px #7c3aed33; }
    .skull { font-size:2.5rem; text-align:center; margin-bottom:16px; }
    h1 { color:var(--purple2); font-size:1.4rem; margin-bottom:8px; text-align:center; }
    p { color:#666; font-size:.8rem; text-align:center; margin-bottom:28px; }
    input { width:100%; background:var(--bg); border:1px solid #333; border-radius:8px; padding:12px; color:var(--text); font-family:inherit; font-size:.9rem; margin-bottom:16px; outline:none; }
    input:focus { border-color:var(--purple); }
    button { width:100%; background:var(--purple); border:none; border-radius:8px; padding:13px; color:#fff; font-family:inherit; font-size:.95rem; cursor:pointer; font-weight:bold; letter-spacing:1px; }
    button:hover { background:#6d28d9; }
    .err { color:#f87171; font-size:.8rem; text-align:center; margin-top:12px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="skull">💀</div>
    <h1>CRITTIX PANEL</h1>
    <p>Bot Management System</p>
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Enter password" autofocus>
      <button type="submit">ACCESS</button>
    </form>
    <div id="errMsg" class="err" style="display:none">⚠ Wrong password</div>
  </div>
  <script>
    if (location.search.includes('err=1')) document.getElementById('errMsg').style.display = 'block';
  </script>
</body>
</html>
